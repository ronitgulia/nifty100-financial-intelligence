<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nifty 100 Financial Intelligence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; box-sizing: border-box; }
        body { background: #f0f2f5; color: #1a1a2e; margin: 0; }

        /* Navbar */
        .navbar {
            background: #fff !important;
            border-bottom: 1px solid #dde1e7;
            padding: 0 24px;
            height: 52px;
        }
        .navbar-brand {
            font-size: 1rem;
            font-weight: 700;
            color: #1a1a2e !important;
            letter-spacing: -0.2px;
        }
        .navbar-brand .dot { color: #ff6b35; }
        .nav-link {
            font-size: 0.82rem;
            color: #555 !important;
            padding: 4px 12px !important;
            border-radius: 4px;
        }
        .nav-link:hover { background: #f0f2f5; color: #1a1a2e !important; }
        .nav-link.active { color: #ff6b35 !important; font-weight: 600; }

        /* Cards */
        .card {
            background: #fff;
            border: 1px solid #dde1e7;
            border-radius: 6px;
            box-shadow: none;
        }
        .card-header {
            background: #fff;
            border-bottom: 1px solid #dde1e7;
            padding: 10px 16px;
            font-size: 0.82rem;
            font-weight: 600;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Stat cards */
        .stat-card {
            background: #fff;
            border: 1px solid #dde1e7;
            border-radius: 6px;
            padding: 14px 18px;
        }
        .stat-number {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1a1a2e;
            line-height: 1.2;
        }
        .stat-label {
            font-size: 0.75rem;
            color: #999;
            margin-top: 2px;
        }
        .stat-card .change-up { color: #00b386; font-size: 0.75rem; }
        .stat-card .change-down { color: #e04f4f; font-size: 0.75rem; }

        /* Table */
        .table { font-size: 0.82rem; color: #1a1a2e; margin-bottom: 0; }
        .table thead th {
            background: #f7f8fa;
            color: #888;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #dde1e7;
            padding: 8px 12px;
            white-space: nowrap;
        }
        .table td {
            padding: 9px 12px;
            border-color: #f0f2f5;
            vertical-align: middle;
        }
        .table tbody tr:hover { background: #f7f8fa; cursor: pointer; }

        /* Badges */
        .badge-excellent { background: #e6f9f2; color: #00875a; font-size: 0.72rem; padding: 3px 8px; border-radius: 3px; font-weight: 600; }
        .badge-good      { background: #e3f9e5; color: #1e8a3c; font-size: 0.72rem; padding: 3px 8px; border-radius: 3px; font-weight: 600; }
        .badge-average   { background: #fff8e6; color: #b36a00; font-size: 0.72rem; padding: 3px 8px; border-radius: 3px; font-weight: 600; }
        .badge-weak      { background: #fff0e6; color: #cc4400; font-size: 0.72rem; padding: 3px 8px; border-radius: 3px; font-weight: 600; }
        .badge-poor      { background: #ffe6e6; color: #cc0000; font-size: 0.72rem; padding: 3px 8px; border-radius: 3px; font-weight: 600; }

        /* Search */
        .search-box {
            border: 1px solid #dde1e7;
            border-radius: 4px;
            padding: 7px 12px;
            font-size: 0.82rem;
            color: #1a1a2e;
            width: 100%;
            background: #fff;
        }
        .search-box:focus {
            outline: none;
            border-color: #ff6b35;
            box-shadow: 0 0 0 2px rgba(255,107,53,0.1);
        }

        /* Sector tag */
        .sector-tag {
            background: #f0f2f5;
            color: #555;
            font-size: 0.72rem;
            padding: 2px 8px;
            border-radius: 3px;
            font-weight: 500;
        }

        /* Buttons */
        .btn-primary {
            background: #ff6b35;
            border: none;
            font-size: 0.78rem;
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: 500;
        }
        .btn-primary:hover { background: #e55a25; }
        .btn-outline-secondary {
            border-color: #dde1e7;
            color: #555;
            font-size: 0.78rem;
            padding: 4px 12px;
        }

        /* Progress bar */
        .score-bar { height: 4px; background: #f0f2f5; border-radius: 2px; }
        .score-fill { height: 4px; border-radius: 2px; }

        /* Links */
        a { text-decoration: none; }
        a:hover { text-decoration: none; }
        .company-link { color: #1a1a2e; font-weight: 500; }
        .company-link:hover { color: #ff6b35; }
        code {
            background: #f0f2f5;
            color: #ff6b35;
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 0.78rem;
        }

        /* Footer */
        footer {
            margin-top: 40px;
            padding: 16px;
            text-align: center;
            font-size: 0.75rem;
            color: #bbb;
            border-top: 1px solid #dde1e7;
            background: #fff;
        }

        h2 { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.3px; }
        h5 { font-size: 0.88rem; font-weight: 600; }
        .text-muted { color: #999 !important; font-size: 0.8rem; }
        .positive { color: #00b386; font-weight: 500; }
        .negative { color: #e04f4f; font-weight: 500; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid px-3">
            <a class="navbar-brand" href="/">
                Nifty100<span class="dot">.</span>in
            </a>
            <div class="navbar-nav ms-auto d-flex flex-row gap-1">
                <a class="nav-link" href="/">Screener</a>
                <a class="nav-link" href="/sector/IT">Sectors</a>
                <a class="nav-link" href="/api/companies/" target="_blank">API</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4 my-3">
        {% block content %}{% endblock %}
    </div>

    <footer>
        Nifty 100 Financial Intelligence &mdash; Bluestock Fintech Internship &mdash; Ronit Gulia
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
