<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nifty 100 — Financial Intelligence</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f1117; color: #ffffff; font-family: 'Segoe UI', sans-serif; }
        
        .navbar {
            background: #1a1d2e;
            padding: 16px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #2d3050;
        }
        .navbar h1 { color: #4f8ef7; font-size: 22px; }
        .navbar span { color: #888; font-size: 14px; }

        .hero {
            background: linear-gradient(135deg, #1a1d2e 0%, #0f1117 100%);
            padding: 60px 40px;
            text-align: center;
            border-bottom: 1px solid #2d3050;
        }
        .hero h2 { font-size: 36px; color: #fff; margin-bottom: 12px; }
        .hero p { color: #888; font-size: 16px; }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 60px;
            padding: 30px 40px;
            background: #1a1d2e;
            border-bottom: 1px solid #2d3050;
        }
        .stat { text-align: center; }
        .stat-number { font-size: 28px; font-weight: 700; color: #4f8ef7; }
        .stat-label { font-size: 13px; color: #888; margin-top: 4px; }

        .controls {
            padding: 24px 40px;
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }
        .search-box {
            padding: 10px 16px;
            background: #1a1d2e;
            border: 1px solid #2d3050;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            width: 280px;
        }
        .search-box::placeholder { color: #555; }
        .filter-btn {
            padding: 10px 20px;
            background: #1a1d2e;
            border: 1px solid #2d3050;
            border-radius: 8px;
            color: #888;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: #4f8ef7;
            color: #fff;
            border-color: #4f8ef7;
        }

        .companies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            padding: 0 40px 40px;
        }
        .company-card {
            background: #1a1d2e;
            border: 1px solid #2d3050;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .company-card:hover {
            border-color: #4f8ef7;
            transform: translateY(-2px);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .company-symbol {
            background: #2d3050;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            color: #4f8ef7;
            font-weight: 600;
        }
        .health-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
        }
        .EXCELLENT { background: #1a3a2a; color: #4ade80; }
        .GOOD { background: #1a2a3a; color: #60a5fa; }
        .AVERAGE { background: #2a2a1a; color: #fbbf24; }
        .WEAK { background: #2a1a1a; color: #f87171; }
        .POOR { background: #3a1a1a; color: #ef4444; }

        .company-name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #fff;
        }
        .company-sector {
            font-size: 12px;
            color: #888;
            margin-bottom: 16px;
        }
        .score-bar-container {
            margin-bottom: 8px;
        }
        .score-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
        }
        .score-bar {
            height: 4px;
            background: #2d3050;
            border-radius: 2px;
            overflow: hidden;
        }
        .score-fill {
            height: 100%;
            border-radius: 2px;
            background: #4f8ef7;
            transition: width 0.5s ease;
        }

        .loading {
            text-align: center;
            padding: 80px;
            color: #888;
            font-size: 16px;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <h1>Nifty 100 Intelligence</h1>
    <span>Financial Analytics Platform</span>
</nav>

<div class="hero">
    <h2>India's Top 100 Companies</h2>
    <p>ML-powered financial health scores — real data, real insights</p>
</div>

<div class="stats-bar">
    <div class="stat">
        <div class="stat-number" id="total-companies">--</div>
        <div class="stat-label">Companies</div>
    </div>
    <div class="stat">
        <div class="stat-number" id="total-sectors">--</div>
        <div class="stat-label">Sectors</div>
    </div>
    <div class="stat">
        <div class="stat-number" id="excellent-count">--</div>
        <div class="stat-label">Excellent Health</div>
    </div>
    <div class="stat">
        <div class="stat-number" id="good-count">--</div>
        <div class="stat-label">Good Health</div>
    </div>
</div>

<div class="controls">
    <input type="text" class="search-box" id="search" placeholder="Search company...">
    <button class="filter-btn active" onclick="filterSector('all', this)">All</button>
    <div id="sector-filters"></div>
</div>

<div id="companies-container" class="companies-grid">
    <div class="loading">Loading companies...</div>
</div>

<script>
    let allCompanies = [];
    let allScores = {};

    async function loadData() {
        const [companiesRes, scoresRes] = await Promise.all([
            fetch('/api/companies/'),
            fetch('/api/top-companies/?limit=200')
        ]);
        allCompanies = await companiesRes.json();
        const scores = await scoresRes.json();

        scores.forEach(s => { allScores[s.company_id] = s; });

        updateStats();
        loadSectorFilters();
        renderCompanies(allCompanies);
    }

    function updateStats() {
        document.getElementById('total-companies').textContent = allCompanies.length;
        const sectors = new Set(allCompanies.map(c => c.sector));
        document.getElementById('total-sectors').textContent = sectors.size;
        const excellent = Object.values(allScores).filter(s => s.health_label === 'EXCELLENT').length;
        const good = Object.values(allScores).filter(s => s.health_label === 'GOOD').length;
        document.getElementById('excellent-count').textContent = excellent;
        document.getElementById('good-count').textContent = good;
    }

    function loadSectorFilters() {
        const sectors = [...new Set(allCompanies.map(c => c.sector))].sort();
        const container = document.getElementById('sector-filters');
        container.style.display = 'flex';
        container.style.gap = '8px';
        container.style.flexWrap = 'wrap';
        sectors.forEach(sector => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn';
            btn.textContent = sector;
            btn.onclick = () => filterSector(sector, btn);
            container.appendChild(btn);
        });
    }

    function filterSector(sector, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filtered = sector === 'all' ? allCompanies : allCompanies.filter(c => c.sector === sector);
        renderCompanies(filtered);
    }

    function renderCompanies(companies) {
        const container = document.getElementById('companies-container');
        const search = document.getElementById('search').value.toLowerCase();
        const filtered = companies.filter(c =>
            c.company_name.toLowerCase().includes(search) ||
            c.id.toLowerCase().includes(search)
        );

        container.innerHTML = filtered.map(company => {
            const score = allScores[company.id] || {};
            const overall = score.overall_score ? score.overall_score.toFixed(1) : '--';
            const label = score.health_label || 'N/A';
            const scoreWidth = score.overall_score ? score.overall_score : 0;

            return `
            <a href="/company/${company.id}/" class="company-card">
                <div class="card-header">
                    <span class="company-symbol">${company.id}</span>
                    <span class="health-badge ${label}">${label}</span>
                </div>
                <div class="company-name">${company.company_name}</div>
                <div class="company-sector">${company.sector}</div>
                <div class="score-bar-container">
                    <div class="score-label">
                        <span>Health Score</span>
                        <span>${overall}</span>
                    </div>
                    <div class="score-bar">
                        <div class="score-fill" style="width: ${scoreWidth}%"></div>
                    </div>
                </div>
            </a>`;
        }).join('');
    }

    document.getElementById('search').addEventListener('input', () => renderCompanies(allCompanies));

    loadData();
</script>
</body>
</html>
